  linuxBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install requirements and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar gnupg2 rpm dpkg fakeroot
          curl -sS https://dl.yarnpkg.com/debian/pubkey.gpg | sudo apt-key add -
          echo "deb https://dl.yarnpkg.com/debian/ stable main" | sudo tee /etc/apt/sources.list.d/yarn.list
          sudo apt-get update
          sudo apt-get install -y yarn
          echo Node $(node --version)
          echo Yarn $(yarn --version)
          yarn
          yarn global add @electron-forge/cli
          yarn global add ynpx
      - name: Build commit ${{ github.sha }}
        run: |
          yarn make-linux
      - name: Test commit ${{ github.sha }}
        run: |
          yarn test
  win32Build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install requirements and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar gnupg2 rpm dpkg fakeroot wine64
          curl -sS https://dl.yarnpkg.com/debian/pubkey.gpg | sudo apt-key add -
          echo "deb https://dl.yarnpkg.com/debian/ stable main" | sudo tee /etc/apt/sources.list.d/yarn.list
          sudo apt-get update
          sudo apt-get install -y yarn
          echo Node $(node --version)
          echo Yarn $(yarn --version)
          yarn global add @electron-forge/cli
          yarn global add ynpx
          yarn
          sudo apt update
          sudo apt install dirmngr gnupg apt-transport-https ca-certificates software-properties-common
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 3FA7E0328081BFF6A14DA29AA6A19B38D3D831EF
          sudo apt-add-repository 'deb https://download.mono-project.com/repo/ubuntu stable-focal main'
          sudo apt install mono-complete
          sudo apt-get install -y aptitude
          sudo dpkg --add-architecture i386
          wget -nc https://dl.winehq.org/wine-builds/winehq.key && sudo apt-key add winehq.key
          sudo add-apt-repository 'deb https://dl.winehq.org/wine-builds/ubuntu/ focal main'
          sudo apt update
          sudo add-apt-repository -y ppa:cybermax-dexter/sdl2-backport
          sudo aptitude install -y winehq-stable
          sudo aptitude install -y wine32-development
          sudo aptitude install -y wine32:i386
          sudo apt-get install -y wine32
          echo Wine $(wine --version)
      - name: Build commit ${{ github.sha }}
        run: |
          yarn make-win32
      - name: Test commit ${{ github.sha }}
        run: |
          yarn test